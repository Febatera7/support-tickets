services:
  postgres:
    image: postgres:16-alpine
    container_name: support_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - support_network

  redis:
    image: redis:7-alpine
    container_name: support_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - support_network

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: support_keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HEALTH_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
    ports:
      - '8080:8080'
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'exec 3<>/dev/tcp/localhost/8080 && echo -e "GET /health/ready HTTP/1.1\nhost: localhost\n\n" >&3 && timeout 1 cat <&3 | grep -q "UP"']
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - support_network

  keycloak-setup:
    image: quay.io/keycloak/keycloak:23.0
    container_name: support_keycloak_setup
    entrypoint: ['/bin/bash', '/setup/setup.sh']
    volumes:
      - ./infra/keycloak/setup.sh:/setup/setup.sh
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - support_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: support_api
    env_file: .env
    ports:
      - '${API_PORT}:${API_PORT}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      keycloak-setup:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - support_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: support_worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - support_network

volumes:
  postgres_data:
  redis_data:

networks:
  support_network:
    driver: bridge
